# Hirogi Games Core — txAdmin deployment recipe
# Docs: https://github.com/tabarra/txAdmin/blob/master/docs/recipe.md
#
# Deploys the Hirogi Games RP framework: hg-lib + hgpostgresql + hg-framework-core
# and the resources built on top of them, plus the standard cfx base resources.
#
# BEFORE USING: push this workspace to GitHub and, if the repo name differs,
# update the second download_github task below. hgpostgresql/dist/index.js must
# be committed (the recipe deploys the build output; it does not run bun/tsc).

name: Hirogi Games Core
version: "1.0.0"
author: Hirogi Games
description: >-
  Hirogi Games RP framework: player/money/jobs core with PostgreSQL
  persistence, slot-based inventory, synced weather/clock, doorlocks, and
  activity jobs (recycling, scrapyard, weed).

$engine: 3
$minFxVersion: 5894
$onesync: on
$steamRequired: false

tasks:
  # ── Base server data (mapmanager, chat, spawnmanager, sessionmanager, …) ──
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    dest: ./tmp/cfx
  - action: move_path
    src: ./tmp/cfx/resources
    dest: ./resources

  # ── Hirogi Games framework ──
  - action: download_github
    src: https://github.com/xxxjahlilallenxxx/hirogi-games-core-fivem
    ref: master
    dest: ./tmp/hirogi
  - action: ensure_dir
    path: ./resources/[hirogi]
  - action: move_path
    src: ./tmp/hirogi/hg-lib
    dest: ./resources/[hirogi]/hg-lib
  - action: move_path
    src: ./tmp/hirogi/hgpostgresql
    dest: ./resources/[hirogi]/hgpostgresql
  - action: move_path
    src: ./tmp/hirogi/hg-framework-core
    dest: ./resources/[hirogi]/hg-framework-core
  - action: move_path
    src: ./tmp/hirogi/hg-inventory
    dest: ./resources/[hirogi]/hg-inventory
  - action: move_path
    src: ./tmp/hirogi/hg-weathersync
    dest: ./resources/[hirogi]/hg-weathersync
  - action: move_path
    src: ./tmp/hirogi/hg-doorlock
    dest: ./resources/[hirogi]/hg-doorlock
  - action: move_path
    src: ./tmp/hirogi/hg-recyclejob
    dest: ./resources/[hirogi]/hg-recyclejob
  - action: move_path
    src: ./tmp/hirogi/hg-scrapyard
    dest: ./resources/[hirogi]/hg-scrapyard
  - action: move_path
    src: ./tmp/hirogi/hg-weed
    dest: ./resources/[hirogi]/hg-weed
  - action: move_path
    src: ./tmp/hirogi/bob74_ipl
    dest: ./resources/[hirogi]/bob74_ipl
  - action: move_path
    src: ./tmp/hirogi/breze_benefactor
    dest: ./resources/[hirogi]/breze_benefactor
  - action: move_path
    src: ./tmp/hirogi/connectqueue
    dest: ./resources/[hirogi]/connectqueue
  - action: move_path
    src: ./tmp/hirogi/dealer_map
    dest: ./resources/[hirogi]/dealer_map
  - action: move_path
    src: ./tmp/hirogi/fivem-vstancer
    dest: ./resources/[hirogi]/fivem-vstancer
  # menuv must contain the built MenuV release (committed to the repo like
  # hgpostgresql's dist/) — hg-adminmenu consumes it via @menuv/menuv.lua.
  - action: move_path
    src: ./tmp/hirogi/menuv
    dest: ./resources/[hirogi]/menuv
  - action: move_path
    src: ./tmp/hirogi/hg-adminmenu
    dest: ./resources/[hirogi]/hg-adminmenu
  - action: move_path
    src: ./tmp/hirogi/hg-ambulancejob
    dest: ./resources/[hirogi]/hg-ambulancejob
  - action: move_path
    src: ./tmp/hirogi/hg-doctor
    dest: ./resources/[hirogi]/hg-doctor
  - action: move_path
    src: ./tmp/hirogi/hg-military
    dest: ./resources/[hirogi]/hg-military
  - action: move_path
    src: ./tmp/hirogi/hg-weapons
    dest: ./resources/[hirogi]/hg-weapons
  - action: move_path
    src: ./tmp/hirogi/hg-apartments
    dest: ./resources/[hirogi]/hg-apartments
  - action: move_path
    src: ./tmp/hirogi/hg-multicharacter
    dest: ./resources/[hirogi]/hg-multicharacter
  - action: move_path
    src: ./tmp/hirogi/hg-spawn
    dest: ./resources/[hirogi]/hg-spawn
  - action: remove_path
    path: ./tmp

  # ── Server config ──
  - action: write_file
    file: ./server.cfg
    data: |
      # Hirogi Games Core — generated by the txAdmin recipe
      {{serverEndpoints}}
      sv_licenseKey "{{svLicense}}"
      sv_maxclients {{maxClients}}

      sv_hostname "Hirogi Games RP"
      sets sv_projectName "Hirogi Games"
      sets sv_projectDesc "{{recipeDescription}}"
      sets locale "en-US"
      sv_enforceGameBuild 3258
      set steam_webApiKey "none"

      ## PostgreSQL (hgpostgresql) — EDIT BEFORE FIRST START
      set postgres_host "localhost"
      set postgres_port "5432"
      set postgres_database "hgcore"
      set postgres_user "postgres"
      set postgres_password "CHANGE_ME"
      # …or replace the five convars above with one connection string:
      # set postgres_connection_string "postgresql://user:password@host:5432/hgcore?sslmode=require"

      ## Base resources (basic-gamemode is intentionally NOT started:
      ## hg-framework-core handles spawning itself)
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure baseevents
      ensure hardcap

      ## Map fixes and customization
      ensure bob74_ipl
      ensure breze_benefactor
      ensure dealer_map
      ensure fivem-vstancer

      ## Hirogi Games stack — order matters:
      ## connectqueue + hg-lib + hgpostgresql before hg-framework-core → the rest
      ensure connectqueue
      ensure hg-lib
      ensure hgpostgresql
      ensure hg-framework-core
      ensure hg-multicharacter
      ensure hg-spawn
      ensure hg-inventory
      ensure hg-weapons
      ensure hg-apartments
      ensure hg-weathersync
      ensure hg-doorlock
      ensure hg-ambulancejob
      ensure hg-doctor
      ensure hg-military
      ensure hg-recyclejob
      ensure hg-scrapyard
      ensure hg-weed

      ## Admin (menuv is the third-party MenuV release)
      ensure menuv
      ensure hg-adminmenu

      ## Admins
      {{addPrincipalsMaster}}
      add_ace group.admin command allow
      add_ace group.admin command.quit deny
      add_ace group.admin hgadmin.menu allow
      add_ace group.admin hgadmin.revive allow
      add_ace group.admin hgadmin.military allow
      add_ace group.admin connectqueue.priority allow
